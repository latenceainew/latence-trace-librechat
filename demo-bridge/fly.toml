app = "latenceai-trace-bridge"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8788"
  LATENCE_TRACE_URL = "https://api.latence.ai"
  LATENCE_TRACE_TIMEOUT = "600"
  TRACE_DEMO_BRIDGE_CORS_ORIGINS = "https://demo.latence.ai,https://latenceai-trace-demo.fly.dev,http://localhost:3080,http://localhost:3090,http://localhost:3092"

[http_service]
  internal_port = 8788
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
