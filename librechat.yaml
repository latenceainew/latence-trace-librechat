version: 1.3.9
cache: true

interface:
  customWelcome: 'Latence TRACE demo: choose a workflow, run a chat turn, and inspect the TRACE decision path.'
  modelSelect: true
  parameters: false
  presets: true
  prompts:
    use: true
    create: false
    share: false
    public: false
  bookmarks: false
  multiConvo: false
  marketplace:
    use: false
  fileCitations: true

registration:
  socialLogins: []

endpoints:
  custom:
    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      headers:
        HTTP-Referer: '${LATENCE_DEMO_PUBLIC_URL}'
        X-Title: 'Latence TRACE Demo'
      models:
        default:
          - 'nvidia/nemotron-3-nano-30b-a3b:free'
          - 'minimax/minimax-m2.5:free'
          - 'openai/gpt-oss-120b:free'
          - 'z-ai/glm-4.5-air:free'
          - 'google/gemma-4-26b-a4b-it:free'
        fetch: false
      titleConvo: true
      titleModel: 'nvidia/nemotron-3-nano-30b-a3b:free'
      summarize: false
      # Hint a tiny per-chunk delay so providers that burst large deltas
      # (e.g. Google AI Studio for Gemma) still feel like real streaming.
      streamRate: 25
      dropParams:
        - stop
      modelDisplayLabel: 'OpenRouter demo models'

modelSpecs:
  enforce: true
  list:
    - name: 'trace-rag-demo'
      label: 'TRACE RAG Demo'
      description: 'Support workflow with retrieved policy context and TRACE groundedness review.'
      default: true
      preset:
        endpoint: 'OpenRouter'
        endpointType: 'custom'
        model: 'nvidia/nemotron-3-nano-30b-a3b:free'
        temperature: 0.2
actions:
  allowedDomains:
    - 'api.latence.ai'
    - 'api.runpod.ai'
    - 'openrouter.ai'
