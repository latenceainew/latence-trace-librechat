version: 1.3.9
cache: true

interface:
  customWelcome: 'Latence TRACE demo: choose a workflow, run a chat turn, and inspect the TRACE decision path.'
  modelSelect: true
  parameters: false
  presets: true
  prompts:
    use: true
    create: false
    share: false
    public: false
  bookmarks: false
  multiConvo: false
  marketplace:
    use: false
  fileCitations: true

registration:
  socialLogins: []

endpoints:
  custom:
    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      headers:
        HTTP-Referer: '${LATENCE_DEMO_PUBLIC_URL}'
        X-Title: 'Latence TRACE Demo'
      models:
        default:
          - 'nvidia/nemotron-3-super-120b-a12b:free'
        fetch: false
      titleConvo: true
      titleModel: 'nvidia/nemotron-3-super-120b-a12b:free'
      summarize: false
      dropParams:
        - stop
      modelDisplayLabel: 'OpenRouter demo models'

modelSpecs:
  enforce: true
  list:
    - name: 'trace-rag-demo'
      label: 'TRACE RAG Demo'
      description: 'Support workflow with retrieved policy context and TRACE groundedness review.'
      default: true
      preset:
        endpoint: 'OpenRouter'
        endpointType: 'custom'
        model: 'nvidia/nemotron-3-super-120b-a12b:free'
        temperature: 0.2
    - name: 'trace-coding-demo'
      label: 'TRACE Coding Demo'
      description: 'Agentic coding workflow with TRACE code-grounding and retry/review routing.'
      preset:
        endpoint: 'OpenRouter'
        endpointType: 'custom'
        model: 'nvidia/nemotron-3-super-120b-a12b:free'
        temperature: 0.1

actions:
  allowedDomains:
    - 'api.latence.ai'
    - 'api.runpod.ai'
    - 'openrouter.ai'
