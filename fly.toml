app = "latenceai-trace-demo"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "3080"
  CONFIG_PATH = "/app/librechat.yaml"
  ENDPOINTS = "custom"
  LATENCE_DEMO_MODE = "true"
  LATENCE_DEMO_PUBLIC_URL = "https://latenceai-trace-demo.fly.dev"
  TRACE_DEMO_BRIDGE_URL = "https://latenceai-trace-bridge.fly.dev"
  LATENCE_TRACE_DEPLOYMENT = "runpod"
  LATENCE_TRACE_TIMEOUT = "600"
  SEARCH = "false"
  ALLOW_REGISTRATION = "true"
  ALLOW_EMAIL_LOGIN = "true"
  ALLOW_SOCIAL_LOGIN = "false"
  ALLOW_SOCIAL_REGISTRATION = "false"

[http_service]
  internal_port = 3080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
